services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10

  book-command:
    build:
      context: .
      dockerfile: BookCommand.Service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BookCommand;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=false"
      RabbitMQConfig__HostName: rabbitmq
      Authentication__Enabled: "false"
    ports:
      - "5001:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  book-query:
    build:
      context: .
      dockerfile: BookQuery.Service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=BookQuery;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=false"
      RabbitMQConfig__HostName: rabbitmq
      Authentication__Enabled: "false"
    ports:
      - "5002:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      book-command:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: BookCatalog.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ReverseProxy__Clusters__command-cluster__Destinations__command__Address: http://book-command:80/
      ReverseProxy__Clusters__query-cluster__Destinations__query__Address: http://book-query:80/
    ports:
      - "8080:80"
    depends_on:
      - book-command
      - book-query
